<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Pet Helper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <nav>
      <a href="index.html" class="nav-logo">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="6" cy="7" rx="2" ry="3"/>
          <ellipse cx="18" cy="7" rx="2" ry="3"/>
          <ellipse cx="3" cy="14" rx="2" ry="2.5"/>
          <ellipse cx="21" cy="14" rx="2" ry="2.5"/>
          <path d="M12 10c-4 0-7 2.5-7 6 0 2.5 2 4 4 4 .8 0 2-.3 3-.3s2.2.3 3 .3c2 0 4-1.5 4-4 0-3.5-3-6-7-6z"/>
        </svg>
        Pet Helper
      </a>
      <div class="nav-links">
        <a href="browse.html"><span>Browse Lost Pets</span></a>
        <a href="login.html" id="nav-login" class="btn-nav"><span>Login</span></a>
        <a href="#" id="nav-logout" class="btn-nav" style="display:none;"><span>Logout</span></a>
      </div>
    </nav>

    <main>
      <div class="auth-wrapper">
        <h1 class="section-title">Welcome to Pet Helper</h1>

        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Log In</button>
          <button class="auth-tab" id="tab-signup" onclick="showTab('signup')">Sign Up</button>
        </div>

        <div id="auth-message"></div>

        <!-- Login Form -->
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required placeholder="you@email.com" />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" required placeholder="Your password" />
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Log In</button>
        </form>

        <!-- Sign Up Form -->
        <form id="signup-form" style="display:none;">
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" required placeholder="you@email.com" />
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" required placeholder="Choose a password (min 6 characters)" />
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
        </form>
      </div>
    </main>

    <footer>
      <p>&copy; 2025 Pet Helper. Helping reunite pets with their families.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
      function showTab(tab) {
        document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
        document.getElementById('auth-message').innerHTML = '';
      }

      function showMessage(text, type) {
        document.getElementById('auth-message').innerHTML =
          `<div class="alert alert-${type}">${text}</div>`;
      }

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { showMessage(error.message, 'error'); }
        else { window.location.href = 'index.html'; }
      });

      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) { showMessage(error.message, 'error'); }
        else { showMessage('Account created! Check your email to confirm, then log in.', 'success'); }
      });
    </script>
  </body>
</html>
